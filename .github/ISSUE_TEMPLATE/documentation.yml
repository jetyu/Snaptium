name: Documentation Issue / 文档问题
description: Improvements or additions to documentation / 对已有文档的改进或补充
title: "[Documentation Issue]: "
labels: ["documentation"]

body:
  - type: textarea
    attributes:
      label: Documentation Issue / 文档问题
      description: |
        Describe what is missing, outdated, or unclear in the documentation.
        描述文档中缺失、过期或不清楚的内容。
      placeholder: |
        The following documentation needs to be updated...
        以下文档内容需要更新或补充：
    validations:
      required: true

  - type: textarea
    attributes:
      label: Suggested Changes / 建议修改
      description: |
        Explain how the documentation should be improved.
        说明你建议如何改进文档。
      placeholder: |
        Add examples or clarify the steps...
        建议补充示例或澄清操作步骤。
    validations:
      required: true
      
  - type: textarea
    attributes:
      label: Additional Context / 补充说明
      description: |
        Any extra information, links, or screenshots.
        相关的补充信息、链接或截图。
