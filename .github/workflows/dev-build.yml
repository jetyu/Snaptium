name: Snaptium Dev Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dev-build:
    name: Dev Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win
            arch: x64
            artifact_pattern: |
              dist/*.exe
              dist/*.blockmap
              dist/*.yml
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_pattern: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.yml
          - os: macos-15
            platform: mac
            arch: arm64
            artifact_pattern: |
              dist/*.dmg
              dist/*.blockmap
              dist/*.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          check-latest: true

      - name: Use npm 11
        run: npm install -g npm@11.4.2

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build development package for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          USE_HARD_LINKS: false

      - name: Upload development package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Snaptium-dev-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 7
          if-no-files-found: error
