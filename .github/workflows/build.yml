name: build

on:
  push:
    branches:
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        arch: [x64]
        include:
          - os: windows-latest
            platform: win
            artifact_pattern: 'dist/*.exe'
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
          - os: macos-latest
            platform: mac
            artifact_pattern: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          check-latest: true

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint || true

      - name: Clean dist folder
        run: npm run clean

      - name: Build for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }} --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          USE_HARD_LINKS: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoteWizard-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Nightly
        if: github.ref == 'refs/heads/develop'
        id: nightly
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          DATE=$(date +'%Y%m%d.%H%M')
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}"

          echo "Nightly version: $NIGHTLY_VERSION"

          npm version $NIGHTLY_VERSION --no-git-tag-version

          git config user.name github-actions
          git config user.email github-actions@github.com

          git tag -f nightly
          git push origin nightly --force

          echo "tag=nightly" >> $GITHUB_OUTPUT
          echo "name=Nightly Build" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT
          echo "make_latest=false" >> $GITHUB_OUTPUT

          echo "Nightly build based on $BASE_VERSION" > release_note.md

      - name: Prepare Official Release
        if: startsWith(github.ref, 'refs/tags/')
        id: official
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
          echo "make_latest=true" >> $GITHUB_OUTPUT

          node scripts/generateReleaseNotes.js $TAG

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          mkdir release_files
          find artifacts -type f -exec cp {} release_files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.nightly.outputs.tag || steps.official.outputs.tag }}
          name: ${{ steps.nightly.outputs.name || steps.official.outputs.name }}
          prerelease: ${{ steps.nightly.outputs.prerelease || steps.official.outputs.prerelease }}
          make_latest: ${{ steps.nightly.outputs.make_latest || steps.official.outputs.make_latest }}
          body_path: release_note.md
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
