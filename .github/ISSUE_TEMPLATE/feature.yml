name: Feature Request / 功能建议
description: Request a new feature / 提出新功能
title: "[Feature]: "
labels: ["Feature"]

body:
  - type: textarea
    attributes:
      label: Problem Description / 问题描述
      description: What problem does this feature solve? / 这个功能解决了什么问题？
      placeholder: |
        I'm frustrated when...
        我在以下场景下感到不便：
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution / 建议的解决方案
      description: How should this feature work? / 希望它如何工作？

  - type: textarea
    attributes:
      label: Alternatives Considered / 替代方案
      description: Any alternative solutions or workarounds? / 是否考虑过其他方案？
