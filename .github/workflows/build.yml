name: build

on:
  push:
    branches:
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Version and Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      tag: ${{ steps.versioning.outputs.tag }}
      is_dev: ${{ steps.versioning.outputs.is_dev }}
      release_name: ${{ steps.versioning.outputs.release_name }}
      prerelease: ${{ steps.versioning.outputs.prerelease }}
      make_latest: ${{ steps.versioning.outputs.make_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Versioning
        id: versioning
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
            DATE=$(date +'%y%m%d')
            VERSION="${BASE_VERSION}-dev.${DATE}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "release_name=v$VERSION" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
            cp .github/RELEASE_TEMPLATE/release_note.md release_note.md
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "release_name=$TAG" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
            # Prepare release notes script execution elsewhere or here
          fi

      - name: Upload Release Notes
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_note.md

  build:
    name: Build on ${{ matrix.os }}-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        arch: [x64]
        include:
          - os: windows-latest
            platform: win
            artifact_pattern: 'dist/*.exe'
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
          - os: macos-latest
            platform: mac
            artifact_pattern: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          check-latest: true

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Set Version
        run: |
          npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version

      - name: Lint
        run: npm run lint || true

      - name: Clean dist folder
        run: npm run clean

      - name: Build for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }} --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          USE_HARD_LINKS: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoteWizard-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release notes
        if: needs.prepare.outputs.is_dev == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Prepare Official Notes
        if: needs.prepare.outputs.is_dev == 'false'
        run: |
          node scripts/generateReleaseNotes.js ${{ needs.prepare.outputs.tag }}
          # Assuming the script generates a file or we need to handle it

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          mkdir release_files
          find artifacts -type f -exec cp {} release_files/ \;

      - name: Update Dev Tag
        if: needs.prepare.outputs.is_dev == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f dev
          git push origin dev --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          body_path: ${{ needs.prepare.outputs.is_dev == 'true' && 'release_note.md' || 'release_notes.md' }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
