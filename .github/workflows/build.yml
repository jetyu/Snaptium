name: Snaptium Release

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R2_ENDPOINT: https://c682d0f655a59157a9b01ed8a07ef379.r2.cloudflarestorage.com

jobs:
  prepare:
    name: Release Preparation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      tag: ${{ steps.versioning.outputs.tag }}
      is_dev: ${{ steps.versioning.outputs.is_dev }}
      release_name: ${{ steps.versioning.outputs.release_name }}
      prerelease: ${{ steps.versioning.outputs.prerelease }}
      make_latest: ${{ steps.versioning.outputs.make_latest }}
      r2_channel: ${{ steps.versioning.outputs.r2_channel }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute Release Info
        id: versioning
        run: |
          if [[ "${{ github.ref }}" != refs/tags/v* ]]; then
            echo "::error::Release must be triggered by tag."
            exit 1
          fi

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          BRANCHES=$(git branch -r --contains "$TAG_COMMIT")

          echo "Branches containing this commit:"
          echo "$BRANCHES"

          IS_MAIN=false
          IS_DEVELOP=false
          IS_FEATURE=false

          if echo "$BRANCHES" | grep -qE "origin/main$"; then
            IS_MAIN=true
          fi

          if echo "$BRANCHES" | grep -qE "origin/develop$"; then
            IS_DEVELOP=true
          fi

          if echo "$BRANCHES" | grep -qE "origin/feature/"; then
            IS_FEATURE=true
          fi

          if [[ "$IS_MAIN" == true && "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable Release (main)"
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
            echo "r2_channel=latest" >> $GITHUB_OUTPUT
          elif [[ "$IS_DEVELOP" == true && "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Beta Release (develop)"
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "r2_channel=beta" >> $GITHUB_OUTPUT
          elif [[ "$IS_FEATURE" == true && "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "Alpha Release (feature)"
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "r2_channel=alpha" >> $GITHUB_OUTPUT
          else
            echo "::error::Tag $TAG does not match branch release policy. Use vX.Y.Z on main, vX.Y.Z-beta.N on develop, or vX.Y.Z-alpha.N on feature/* branches."
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=$TAG" >> $GITHUB_OUTPUT

      - name: Upload Release Notes Template File
        uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: .github/RELEASE_TEMPLATE/release_note.md

  build:
    name: Build on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        arch: [x64]
        include:
          - os: windows-2022
            platform: win
            artifact_pattern: |
              dist/*.exe
              dist/*.blockmap
              dist/*.yml
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.yml
          - os: macos-latest
            platform: mac
            artifact_pattern: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/*.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          check-latest: true

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Set Version
        run: |
          npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version

      - name: Set Release Channel Publish URL
        shell: bash
        env:
          R2_CHANNEL: ${{ needs.prepare.outputs.r2_channel }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const channel = process.env.R2_CHANNEL

          if (!channel) {
            throw new Error('R2_CHANNEL is empty.')
          }

          const packageJsonPath = 'package.json'
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))

          packageJson.build = packageJson.build || {}
          packageJson.build.publish = [
            {
              provider: 'generic',
              url: `https://update.snaptium.com/download/${channel}`
            }
          ]

          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`)

          console.log(`electron-builder publish provider: generic`)
          console.log(`electron-builder publish url: https://update.snaptium.com/download/${channel}`)
          NODE

      - name: Lint
        run: npm run lint || true

      - name: Build for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          USE_HARD_LINKS: false

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Snaptium-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: Publishing Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Release Notes File
        if: needs.prepare.outputs.is_dev == 'true'
        uses: actions/download-artifact@v5
        with:
          name: release-notes
          path: .

      - name: Prepare Pre-Release Notes or Release Notes File
        run: |
          node ./src/scripts/generate-release-notes.js "${{ needs.prepare.outputs.tag }}"
          cp .github/RELEASE_TEMPLATE/release_note.md updated_note.md

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Release installers for all platforms
        run: |
          mkdir -p release_files
          find artifacts -type f ! -name "*.md" -exec cp {} release_files/ \;

      - name: Generate release health manifest
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          R2_CHANNEL: ${{ needs.prepare.outputs.r2_channel }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          import path from 'node:path'

          const releaseDir = 'release_files'
          const version = process.env.RELEASE_VERSION
          const channel = process.env.R2_CHANNEL

          if (!version) {
            throw new Error('RELEASE_VERSION is empty.')
          }

          if (!channel) {
            throw new Error('R2_CHANNEL is empty.')
          }

          const manifestChecks = {
            windows: `${channel}.yml`,
            macos: `${channel}-mac.yml`,
            linux: `${channel}-linux.yml`
          }

          const platforms = Object.fromEntries(
            Object.entries(manifestChecks).map(([platform, manifest]) => {
              const manifestPath = path.join(releaseDir, manifest)
              const ok = fs.existsSync(manifestPath) && fs.statSync(manifestPath).isFile() && fs.statSync(manifestPath).size > 0

              return [
                platform,
                {
                  manifest,
                  ok
                }
              ]
            })
          )

          const health = {
            ok: Object.values(platforms).every((platform) => platform.ok),
            version,
            platforms,
            generated_at: new Date().toISOString()
          }

          const healthPath = path.join(releaseDir, 'health.json')
          fs.writeFileSync(healthPath, `${JSON.stringify(health, null, 2)}\n`)

          console.log(`Generated ${healthPath}:`)
          console.log(JSON.stringify(health, null, 2))

          if (!health.ok) {
            const missingManifests = Object.values(platforms)
              .filter((platform) => !platform.ok)
              .map((platform) => platform.manifest)
              .join(', ')

            throw new Error(`Release health check failed. Missing or empty manifests: ${missingManifests}`)
          }
          NODE

      - name: Generate GitHub Release Page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          body_path: updated_note.md
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y unzip

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip

          sudo ./aws/install \
            --bin-dir /usr/local/bin \
            --install-dir /usr/local/aws-cli \
            --update

          aws --version

      - name: Upload to Cloudflare R2 channel
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_CHANNEL: ${{ needs.prepare.outputs.r2_channel }}
        run: |
          set -euo pipefail

          if [[ -z "$R2_CHANNEL" ]]; then
            echo "::error::R2 channel is empty."
            exit 1
          fi

          echo "Uploading release files to R2 channel: download/$R2_CHANNEL/"

          aws s3 sync release_files/ \
            "s3://$R2_BUCKET/download/$R2_CHANNEL/" \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto \
            --delete \
            --no-progress

          echo "R2 upload completed: download/$R2_CHANNEL/"
