name: Bug Report
description: Report a bug or unexpected behavior / 报告缺陷或非预期行为
title: "[Bug Report]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please provide as much detail as possible to help us reproduce and fix the issue.

        感谢你提交 Bug。
        请尽可能提供详细信息，以帮助我们复现并修复该问题。

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: The version of NoteWizard you are using. Required | 当前使用的 NoteWizard 版本（必填）
      placeholder: e.g. 1.0.5
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
     label: Operating System / 操作系统
     description: Select the operating system where the issue occurs. Required | 选择发生问题的操作系统（必填）
     options:
       - Windows 10
       - Windows 11
       - macOS (Intel)
       - macOS (Apple Silicon)
       - Linux
       - Other
    validations:
     required: true
  
  - type: input
    id: os_other
    attributes:
     label: Other Operating System (if applicable) / 其他操作系统（如适用）
     description: |
       Please specify if you selected "Other".
       如选择“其他”，请在此填写具体操作系统。
     placeholder: e.g. Ubuntu 24.04 / Arch Linux / Fedora
  
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Detailed steps to reliably reproduce the issue. Required | 请提供可复现问题的详细步骤（必填）
      placeholder: |
        e.g.
        1. Open NoteWizard
        2. Insert a line of text
        3. Observe the cursor position

        例：
        1. 打开 NoteWizard
        2. 插入一行文本
        3. 观察光标位置
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望结果
      description: What you expected to happen. Required | 你期望发生的结果（必填）
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际结果
      description: What actually happened. Required | 实际发生的情况（必填）
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Logs / Screenshots / 日志或截图
      description: |
        Attach logs, error messages, or screenshots if available.
        如有相关日志、错误信息或截图，请一并附上（可选）。
