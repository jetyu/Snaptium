name: Documentation Issue
description: Improvements or additions to documentation / 对已有文档的改进或补充
title: "[Documentation Issue]"
labels: ["documentation"]

body:
  - type: markdown
    attributes:
      value: |
        ## Documentation Issue / 文档问题
        We welcome suggestions to improve the documentation and make it clearer and more accurate.
        欢迎提出文档改进建议，帮助我们让文档更清晰、更准确。

  - type: textarea
    attributes:
      label: Documentation Issue / 文档问题
      description: |
        Describe what is missing, outdated, or unclear in the documentation. Require | 描述文档中缺失、过期或不清楚的内容。（必填）
      placeholder: |
        The following documentation needs to be updated...
        以下文档内容需要更新或补充：
    validations:
      required: true

  - type: textarea
    attributes:
      label: Suggested Changes / 建议修改
      description: |
        Explain how the documentation should be improved. Require | 说明你建议如何改进文档。（必填）
      placeholder: |
        Add examples or clarify content...
        建议补充示例或内容。
    validations:
      required: true
      
  - type: textarea
    attributes:
      label: Additional Context / 补充说明
      description: |
        Any extra information, links, or screenshots. | 相关的补充信息、链接或截图。
