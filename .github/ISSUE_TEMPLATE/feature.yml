name: Feature Request
description: Request a new feature / 提出新功能
title: "[Feature Request]: "
labels: ["Feature"]

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request / 功能请求
        Thanks for taking the time to suggest a new feature!
        感谢你为项目提出新的想法，请尽量提供完整信息，这有助于我们更快理解和评估该功能。
        

  - type: textarea
    attributes:
      label: Problem Description / 问题描述
      description: What problem does this feature solve? | 新功能可以解决什么问题？
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution / 建议的解决方案
      description: How should this feature work? | 希望它如何工作？
      placeholder: |
           e.g. Describe expected behavio of the feature in detail.
           例：请详细描述该功能的期望行为。
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered / 替代方案
      description: Any alternative solutions or workarounds? | 是否考虑过其他方案？
