name: Bug Report
description: Report a bug or unexpected behavior / 报告缺陷或非预期行为
labels: ["Bug"]
assignees:
  - jetyu

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report / 报告缺陷
        Thanks for reporting a bug. Please provide as much detail as possible to help us reproduce and fix the issue.
        感谢你提交Bug，请尽可能提供详细信息，以帮助我们复现并修复该问题。

  - type: dropdown
    id: os
    attributes:
     label: Operating System / 操作系统
     description: Select the operating system you are using. Required | 当前使用的操作系统（必填）
     options:
       - Windows 11
       - Windows 10
       - macOS (Intel)
       - macOS (Apple Silicon)
       - Linux
    validations:
     required: true

  - type: input
    id: os_version
    attributes:
      label: Operating System Version / 操作系统版本
      description: The version of OS you are using. Required | 当前使用的操作系统版本（必填）
      placeholder: e.g. Windows 11 23H2, macOS 13.6, Ubuntu 20.04 LTS, CentOS 9 and etc.
    validations:
      required: true

  - type: input
    id: notewizard_version
    attributes:
      label: NoteWizard Version / NoteWizard版本
      description: The version of NoteWizard you are using. Required | 当前使用的NoteWizard版本（必填）
      placeholder: e.g. 1.0.1
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Detailed steps to reliably reproduce the issue. Required | 请提供可复现问题的详细步骤（必填）
      placeholder: |
        e.g.
        1. Open NoteWizard
        2. Insert a line of text
        3. Observe the cursor position

        例：
        1. 打开 NoteWizard
        2. 插入一行文本
        3. 观察光标位置
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望结果
      description: What you expected to happen. Required | 你期望发生的结果（必填）
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际结果
      description: What actually happened. Required | 实际发生的情况（必填）
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Logs or Screenshots / 日志或截图
      description: |
        Attach logs, error messages, or screenshots if available.
        如有相关日志、错误信息或截图，请一并附上。
